# AprilTag ROS configuration — Raspberry Pi optimised
#
# Key difference from apriltag_params.yaml:
#   quad_decimate: 2.0  — halves detection image resolution before processing,
#                          reducing compute by ~4x. Acceptable pose accuracy at
#                          typical hover distances (1–2 m) with 0.127 m tags.
#
# OPTIONAL on the Pi 5 — benchmarked 2026-07 with the OAK-D-LITE at 1280x720:
# default (non-decimated) params run ~22 Hz detections at ~70% of one core,
# so this file is only needed for extra CPU/thermal headroom, at a small
# cost in pose accuracy.
# See docs/QUICK_RUNBOOK.md Section B.0 for full Pi tuning notes.

apriltag_node:
  ros__parameters:
    # AprilTag family to detect
    family: 36h11

    # Physical size of AprilTag in meters (must match physical tags)
    tag_size: 0.127

    # Do not publish TF from detector; PnP broadcaster handles this
    publish_tf: false

    # Z-axis orientation (false = z-forward, true = z-up)
    z_up: false

    # Image transport
    image_transport: raw

    # Reject tags with hamming distance > 0 (strict — reduces false positives)
    max_hamming: 0

    # Camera frame name
    camera_frame: camera

    # Tag frame prefix
    tag_frame_prefix: tag36h11

    # --- Pi optimisation ---
    # Decimate input image by this factor before quad detection.
    # 2.0 = half resolution → ~4x faster detection, small pose accuracy trade-off.
    # Increase to 3.0 if CPU is still overloaded.
    quad_decimate: 2.0

    # Gaussian blur sigma applied after decimation (0.0 = off).
    # Small value helps with noise on lower-resolution decimated image.
    quad_sigma: 0.5
